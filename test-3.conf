# =============================================================================
# Logstash Configuration Example – Filebeat Modules + Custom Application Logs
# =============================================================================
# This pipeline demonstrates:
#   - Conditional branching based on Filebeat module tags
#   - GROK pattern matching for unstructured custom logs
#   - Ruby inline code to dynamically add tags
#   - Multiple Elasticsearch outputs with dynamic index naming
# =============================================================================

input {
  # Example input: Filebeat (default port 5044)
  beats {
    port => 5044
  }

  # Alternative: read from a log file directly
  # file {
  #   path => "/var/log/myapp/*.log"
  #   type => "custom"
  # }
}

filter {
  # -------------------------------------------------------------------------
  # 1) APACHE MODULE (Filebeat's apache module)
  # -------------------------------------------------------------------------
  if [event][module] == "apache" {
    mutate { add_tag => ["apache"] }

    # Add separate tag for SSL vs non‑SSL traffic
    if "ssl" in [tags] {
      mutate { add_tag => ["apache_ssl"] }
    } else {
      mutate { add_tag => ["apache_nonssl"] }
    }

    # Note: Field parsing is already done by Filebeat's ingest pipeline.
    # No additional grok is required here.
  }

  # -------------------------------------------------------------------------
  # 2) OTHER FILEBEAT MODULES (e.g., system, nginx, mysql)
  # -------------------------------------------------------------------------
  else if [event][module] {
    # These logs arrive already structured; we only tag them for later routing.
    mutate { add_tag => ["filebeat_module"] }
  }

  # -------------------------------------------------------------------------
  # 3) CUSTOM APPLICATION LOGS (no Filebeat module)
  # -------------------------------------------------------------------------
  else {
    # Extract fields from an unstructured log line using GROK
    grok {
      match => { "message" => "@ %{TIMESTAMP_ISO8601:log_timestamp} \[%{DATA:application_name}\] %{LOGLEVEL:log_level}(?:\s\"(?<user>[^\"]*)\")? %{JAVACLASS:class}(?:\s\{(?<custom_tags>.*)\})? \<\[(?<log_message>.*)\]\>(?<stacktrace>(.*[\n\r]?)*)?" }
    }

    # If grok fails, drop the event (avoid indexing garbage)
    if "_grokparsefailure" in [tags] {
      drop { }
    }

    # Process optional 'custom_tags' field: split CSV and add each as a tag
    if [custom_tags] {
      mutate { split => { "custom_tags" => "," } }
      ruby {
        code => 'event.get("custom_tags").each { |tag| event.tag(tag.strip) }'
      }
      mutate { remove_field => ["custom_tags"] }
    }
  }
}

output {
  # Always print to console for debugging (remove in production)
  stdout { codec => rubydebug }

  # -------------------------------------------------------------------------
  # Elasticsearch outputs – dynamic index names based on log source
  # -------------------------------------------------------------------------

  # Apache logs → specific index and custom pipeline
  if [event][module] == "apache" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      index => "filebeat-apache-logs-%{+YYYY.MM}"
      user => "mylogstashuser"
      password => "mystrongpassword"
      ssl_enabled => true
      ssl_certificate_authorities => "/etc/logstash/http_ca.crt"
      data_stream => false
      pipeline => "apache-logs"            # optional ingest pipeline
    }
  }

  # Other Filebeat modules → dynamic index: filebeat-<module>-logs-YYYY.MM
  else if [event][module] {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      # Use the module name (e.g., system, nginx) inside the index name
      index => "filebeat-%{[event][module]}-logs-%{+YYYY.MM}"
      user => "mylogstashuser"
      password => "mystrongpassword"
      ssl_enabled => true
      ssl_certificate_authorities => "/etc/logstash/http_ca.crt"
      data_stream => false
    }
  }

  # Custom (non‑module) logs → daily index
  else {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      index => "my-app-logs-%{+YYYY.MM.dd}"
      user => "mylogstashuser"
      password => "mystrongpassword"
      ssl_enabled => true
      ssl_certificate_authorities => "/etc/logstash/http_ca.crt"
      data_stream => false
    }
  }
}